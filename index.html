<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Vision Tracker</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<header>
    <h1>AI Vision Tracker</h1>
    <p>Real-Time Object Detection & Tracking Dashboard</p>
</header>

<div class="dashboard">

    <section class="video-section glass">

        <div class="toolbar">

            <input
                type="file"
                id="videoInput"
                accept="video/*">

            <button id="startBtn">
                Start
            </button>

            <button id="stopBtn">
                Stop
            </button>

            <button id="webcamBtn">
                Webcam
            </button>

        </div>

        <div class="video-wrapper">

            <video
                id="video"
                playsinline
                muted>
            </video>

            <canvas id="overlay"></canvas>

        </div>

    </section>

    <aside class="glass side-panel">

        <h2>Statistics</h2>

        <div class="stat">
            <span>Objects</span>
            <strong id="objects">0</strong>
        </div>

        <div class="stat">
            <span>Tracks</span>
            <strong id="tracks">0</strong>
        </div>

        <div class="stat">
            <span>FPS</span>
            <strong id="fps">0</strong>
        </div>

        <h2>Activity</h2>

        <div id="activity"></div>

    </aside>

</div>

<script src="script.js"></script>

</body>
</html>
